name: Build & Release

# Builds the standalone Windows portable app and (on a version tag) publishes it
# as a GitHub Release asset. Trigger by pushing a tag like v1.0.0, or run manually
# from the Actions tab (which uploads the zip as a build artifact).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller>=6,<7"

      - name: Build portable app
        run: pyinstaller packaging/BiometricAttendance.spec --noconfirm --distpath dist --workpath build

      - name: Zip portable folder
        run: Compress-Archive -Path dist/BiometricAttendance -DestinationPath BiometricAttendance-portable.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: BiometricAttendance-portable
          path: BiometricAttendance-portable.zip

      - name: Publish release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: BiometricAttendance-portable.zip
          generate_release_notes: true
